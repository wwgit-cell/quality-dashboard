<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>质检爬坡准确率 · 人员趋势看板</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --chart-h: 150px;
      --bg: #F7F8FA;
      --card: #FFFFFF;
      --border: #E5E6EB;
      --primary-text: #1D2129;
      --secondary-text: #86909C;
      --risk: #F54A45;
      --risk-bg: #FFECE8;
      --safe: #34B352;
      --safe-bg: #E8FFF3;
      --shadow: 0 2px 8px rgba(29, 33, 41, 0.06);
      --shadow-hover: 0 6px 20px rgba(29, 33, 41, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--primary-text);
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.5;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 16px 24px 24px; }

    /* Top section wrapper with soft gradient */
    .top-section {
      background: linear-gradient(135deg, #B8D9A8 0%, #FFFFFF 100%);
      border: 1px solid #E5E6EB;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .top-section .header-card {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 4px 12px 8px;
      margin-bottom: 8px;
    }
    .top-section .metric-row {
      margin-bottom: 0;
    }
    .top-section .metric-card {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-color: rgba(229, 230, 235, 0.9);
    }

    /* Header */
    .header-card {
      background: linear-gradient(135deg, #F0FBF3 0%, #FFFFFF 60%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .header-card h1 {
      margin: 0 0 4px;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-text);
    }
    .header-meta {
      color: var(--secondary-text);
      font-size: 13px;
    }
    .header-meta strong { color: var(--primary-text); font-weight: 600; }
    .header-meta .risk-tag { color: var(--risk); font-weight: 600; }
    .header-meta a { color: #2A6AF0; text-decoration: none; font-weight: 600; }
    .header-meta a:hover { text-decoration: underline; }

    /* Metric cards */
    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 16px;
      box-shadow: var(--shadow);
    }
    .metric-card .label {
      color: var(--secondary-text);
      font-size: 13px;
      margin-bottom: 2px;
    }
    .metric-card .value {
      font-size: 21px;
      font-weight: 700;
      color: var(--primary-text);
    }
    .metric-card.risk .value { color: var(--risk); }

    /* Toolbar */
    .toolbar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      box-shadow: var(--shadow);
    }
    .toolbar .field {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .toolbar label { color: var(--secondary-text); }
    .toolbar input, .toolbar select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--primary-text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--safe); }
    .toolbar input[type="search"] { width: 240px; }
    .toolbar .view-switch {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .toolbar .view-switch button {
      background: transparent;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--primary-text);
      transition: all 0.2s;
    }
    .toolbar .view-switch button.active {
      background: var(--safe);
      color: #fff;
      font-weight: 600;
    }
    .toolbar .view-switch button.risk-mode.active {
      background: var(--risk);
    }
    .toolbar .spacer { flex: 1; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 2px 20px 10px;
      color: var(--secondary-text);
      font-size: 13px;
    }
    .pagination button {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--primary-text);
      transition: all 0.15s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--safe); color: var(--safe); }
    .pagination button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    @media (max-width: 1200px) { .card-grid { grid-template-columns: repeat(3, 1fr); } .metric-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 900px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } .metric-row { grid-template-columns: 1fr; } }

    .person-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .person-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .person-card.risk {
      border: 1.5px solid var(--risk);
    }

    .person-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .person-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary-text);
      word-break: break-all;
    }
    .risk-badge {
      background: var(--risk);
      color: #fff;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .person-meta {
      color: var(--secondary-text);
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      align-items: center;
    }
    .person-meta .tag {
      background: #F2F3F5;
      color: #4E5969;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .person-meta .tag.independent-yes { background: #E8FFF3; color: #34B352; }
    .person-meta .tag.independent-no { background: #FFECE8; color: #F54A45; }

    .chart-box { height: var(--chart-h, 150px); margin: 4px 0 0; transition: height 0.15s; }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--border);
    }
    .stat-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-cell .k {
      color: var(--secondary-text);
      font-size: 11px;
    }
    .stat-cell .v {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-text);
    }
    .stat-cell .v.risk { color: var(--risk); }

    .warn-line {
      background: var(--risk-bg);
      color: var(--risk);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .empty {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      color: var(--secondary-text);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-section">
    <div class="header-card">
      <h1>质检爬坡准确率 · 人员趋势看板</h1>
      <div class="header-meta">
        数据范围：<strong id="date-range"></strong>（<strong id="date-count"></strong> 天） · 总人数 <strong id="total-people"></strong> · 风险阈值：<span class="risk-tag">均值 &lt; 90%</span> · 生成时间 <strong id="gen-time"></strong> · 数据源：<a href="https://bytedance.larkoffice.com/wiki/Gx6DwNchOi3kIMkH9yGcB9ZFnTb?sheet=Gn4y0M" target="_blank" rel="noopener">飞书 Wiki · 质检（爬坡）准确率子表</a>
      </div>
    </div>

    <div class="metric-row">
      <div class="metric-card">
        <div class="label">日期天数</div>
        <div class="value"><span id="m-date-count"></span> 天</div>
      </div>
      <div class="metric-card">
        <div class="label">总人数</div>
        <div class="value" id="m-total"></div>
      </div>
      <div class="metric-card">
        <div class="label">整体平均准确率</div>
        <div class="value" id="m-mean"></div>
      </div>
      <div class="metric-card risk">
        <div class="label">风险人数（均值 &lt; 90%）</div>
        <div class="value" id="m-risk"></div>
      </div>
    </div>
    </div><!-- /top-section -->

    <div class="toolbar">
      <div class="field">
        <label>搜索</label>
        <input id="search" type="search" placeholder="按姓名过滤，如 吴佳锡" />
      </div>
      <div class="field">
        <label>队列</label>
        <select id="queue-filter"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>方向</label>
        <select id="direction-filter"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>排序</label>
        <select id="sort-select">
          <option value="risk-asc">风险优先 · 均值升序</option>
          <option value="mean-asc">均值升序</option>
          <option value="mean-desc">均值降序</option>
          <option value="name">按姓名</option>
        </select>
      </div>
      <div class="field">
        <label>视图</label>
        <div class="view-switch" id="view-switch">
          <button data-view="all" class="active">全部人员</button>
          <button data-view="risk" class="risk-mode">仅看风险</button>
        </div>
      </div>
      <div class="field">
        <label>时间范围</label>
        <select id="range-select">
          <option value="7" selected>最近 7 天</option>
          <option value="14">最近 14 天</option>
          <option value="30">最近 30 天</option>
          <option value="all">全部</option>
        </select>
      </div>
      <div class="spacer"></div>
      <div class="field">
        <label>每页</label>
        <select id="page-size">
          <option value="24" selected>24</option>
          <option value="12">12</option>
          <option value="48">48</option>
        </select>
      </div>
    </div>

    <div class="pagination" id="pagination-top">
      <button id="prev-btn">‹ 上一页</button>
      <span id="page-info">1 / 1</span>
      <button id="next-btn">下一页 ›</button>
    </div>

    <div id="grid" class="card-grid"></div>
    <div id="empty" class="empty" style="display:none;">没有匹配的人员</div>

    <div class="pagination" id="pagination-bottom" style="justify-content:center; padding-top:16px;">
      <button id="prev-btn2">‹ 上一页</button>
      <span id="page-info2">1 / 1</span>
      <button id="next-btn2">下一页 ›</button>
    </div>
  </div>

          break;
        case 'name':
          list.sort((a,b) => a.name.localeCompare(b.name, 'zh-CN'));
          break;
      }
      return list;
    }

    function fmtPct(v) {
      if (v === null || v === undefined) return '-';
      return v.toFixed(2) + '%';
    }

    function buildChart(el, person, stats) {
      const risk = isRiskMean(stats.mean);
      const color = risk ? '#F54A45' : '#34B352';
      const areaColor = risk ? 'rgba(245, 74, 69, 0.18)' : 'rgba(52, 179, 82, 0.18)';
      const areaColorEnd = risk ? 'rgba(245, 74, 69, 0.02)' : 'rgba(52, 179, 82, 0.02)';

      const { start, end } = getRange();
      const shortDatesSlice = DATA.shortDates.slice(start, end);
      const headersSlice = DATA.dateHeaders.slice(start, end);
      const dataPoints = stats.scoresSlice.map(v => (v === null || v === undefined) ? null : v);

      const option = {
        grid: { left: 4, right: 4, top: 12, bottom: 36, containLabel: true },
        tooltip: {
          trigger: 'axis',
          confine: true,
          textStyle: { fontSize: 12 },
          formatter: (params) => {
            if (!params || !params.length) return '';
            const p = params[0];
            const raw = p.data;
            const val = (raw === null || raw === undefined) ? '-' : (raw.toFixed(2) + '%');
            return `${headersSlice[p.dataIndex]}<br/>准确率：<b>${val}</b>`;
          }
        },
        xAxis: {
          type: 'category',
          data: shortDatesSlice,
          boundaryGap: false,
          axisLine: { lineStyle: { color: '#E5E6EB' } },
          axisTick: { show: false },
          axisLabel: {
            color: '#86909C',
            fontSize: 9,
            interval: 0,
            rotate: 45,
            margin: 8,
          }
        },
        yAxis: {
          type: 'value',
          min: 0,
          max: 100,
          show: false,
        },
        series: [{
          type: 'line',
          data: dataPoints,
          connectNulls: true,
          smooth: false,
          showSymbol: true,
          symbolSize: 4,
          lineStyle: { color, width: 2 },
          itemStyle: { color },
          areaStyle: {
            color: {
              type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
              colorStops: [
                { offset: 0, color: areaColor },
                { offset: 1, color: areaColorEnd },
              ]
            }
          },
          markLine: {
            symbol: 'none',
            silent: true,
            label: { show: false },
            lineStyle: { color: '#F54A45', type: 'dashed', width: 1 },
            data: [{ yAxis: 90 }]
          }
        }]
      };
      const chart = echarts.init(el, null, { renderer: 'canvas' });
      chart.setOption(option);
      return chart;
    }

    function renderCard(person, stats) {
      const risk = isRiskMean(stats.mean);
      const el = document.createElement('div');
      el.className = 'person-card' + (risk ? ' risk' : '');

      const indClass = person.independent === '是' ? 'independent-yes' : (person.independent === '否' ? 'independent-no' : '');

      const parts = [];
      parts.push(`
        <div class="person-header">
          <div class="person-name">${escapeHtml(person.name)}</div>
          ${risk ? '<span class="risk-badge">△ 风险</span>' : ''}
        </div>
        <div class="person-meta">
          ${person.queue ? `<span class="tag">${escapeHtml(person.queue)}</span>` : ''}
          ${person.direction ? `<span class="tag">${escapeHtml(person.direction)}</span>` : ''}
          ${person.independent ? `<span class="tag ${indClass}">独立质检：${escapeHtml(person.independent)}</span>` : ''}
          <span style="color:#86909C;">${stats.validCount} 个数据点</span>
        </div>
        <div class="chart-box"></div>
        <div class="stat-row">
          <div class="stat-cell"><span class="k">均值</span><span class="v ${risk ? 'risk' : ''}">${fmtPct(stats.mean)}</span></div>
          <div class="stat-cell"><span class="k">最新</span><span class="v">${fmtPct(stats.latest)}</span></div>
          <div class="stat-cell"><span class="k">最低</span><span class="v">${fmtPct(stats.lowest)}</span></div>
          <div class="stat-cell"><span class="k">最高</span><span class="v">${fmtPct(stats.highest)}</span></div>
        </div>
        ${risk ? `<div class="warn-line">△ 均值 ${stats.mean.toFixed(2)}% &lt; 90%</div>` : ''}
      `);
      el.innerHTML = parts.join('');
      return el;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function updateTopMetrics(statsMap) {
      const { count } = getRange();
      const means = [];
      let riskCnt = 0;
      DATA.people.forEach(p => {
        const s = statsMap.get(p);
        if (s && s.mean !== null && s.mean !== undefined) {
          means.push(s.mean);
          if (s.mean < 90) riskCnt++;
        }
      });
      const overall = means.length ? +(means.reduce((a,b)=>a+b,0)/means.length).toFixed(2) : 0;
      document.getElementById('m-date-count').textContent = count;
      document.getElementById('m-mean').textContent = overall.toFixed(2) + '%';
      document.getElementById('m-risk').textContent = riskCnt;
    }

    function firstRowCount(grid) {
      const children = grid.children;
      if (!children.length) return 0;
      const top0 = children[0].offsetTop;
      let n = 0;
      for (let i = 0; i < children.length; i++) {
        if (children[i].offsetTop === top0) n++; else break;
      }
      return n;
    }

    // Adapt chart height so the top area + first card row fit within the
    // visible viewport at 100% browser zoom, without needing to scroll.
    function autoFitCharts() {
      const grid = document.getElementById('grid');
      if (!grid.children.length) return;
      const cols = firstRowCount(grid) || 1;
      const firstRow = Array.from(grid.children).slice(0, cols);
      const chartBox0 = firstRow[0].querySelector('.chart-box');
      if (!chartBox0) return;
      const curChartH = chartBox0.getBoundingClientRect().height || 150;
      // Height a card needs besides its chart (name/meta/stats/warn-line/padding).
      // Measured per card so risk cards (with warn-line) are accounted for.
      let maxOverhead = 0;
      firstRow.forEach(card => {
        const h = card.getBoundingClientRect().height;
        maxOverhead = Math.max(maxOverhead, h - curChartH);
      });
      // Distance from the top of the grid to the bottom of the viewport.
      const gridTop = grid.getBoundingClientRect().top; // page is at scroll-top on load
      const avail = window.innerHeight - gridTop - 28; // breathing room so bottom numbers aren't at the edge
      let target = Math.floor(avail - maxOverhead);
      target = Math.max(64, Math.min(180, target));
      const cur = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--chart-h')) || 150;
      if (Math.abs(target - cur) >= 2) {
        document.documentElement.style.setProperty('--chart-h', target + 'px');
      }
      chartInstances.forEach(c => c.resize());
    }

    function render() {
      // Dispose all charts
      chartInstances.forEach(c => c.dispose());
      chartInstances.clear();

      const statsMap = new Map();
      DATA.people.forEach(p => statsMap.set(p, statsForPerson(p)));
      updateTopMetrics(statsMap);

      const list = filterAndSort(statsMap);
      const totalPages = Math.max(1, Math.ceil(list.length / state.pageSize));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * state.pageSize;
      const end = start + state.pageSize;
      const pageList = list.slice(start, end);

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const empty = document.getElementById('empty');
      if (list.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
      }

      pageList.forEach(p => {
        const s = statsMap.get(p);
        const card = renderCard(p, s);
        grid.appendChild(card);
        const chartBox = card.querySelector('.chart-box');
        const chart = buildChart(chartBox, p, s);
        chartInstances.set(p.name, chart);
      });

      const pageInfo = `${state.page} / ${totalPages}（共 ${list.length} 人）`;
      document.getElementById('page-info').textContent = pageInfo;
      document.getElementById('page-info2').textContent = pageInfo;
      const disablePrev = state.page <= 1;
      const disableNext = state.page >= totalPages;
      document.getElementById('prev-btn').disabled = disablePrev;
      document.getElementById('prev-btn2').disabled = disablePrev;
      document.getElementById('next-btn').disabled = disableNext;
      document.getElementById('next-btn2').disabled = disableNext;

      // Fit the first card row into the viewport after layout settles.
      requestAnimationFrame(autoFitCharts);
    }

    // ---- Bind events ----
    document.getElementById('search').addEventListener('input', (e) => {
      state.keyword = e.target.value;
      state.page = 1;
      render();
    });
    document.getElementById('queue-filter').addEventListener('change', (e) => {
      state.queue = e.target.value;
      state.page = 1;
      render();
    });
    document.getElementById('direction-filter').addEventListener('change', (e) => {
      state.direction = e.target.value;
      state.page = 1;
      render();
    });
    document.getElementById('sort-select').addEventListener('change', (e) => {
      state.sort = e.target.value;
      render();
    });
    document.getElementById('page-size').addEventListener('change', (e) => {
      state.pageSize = parseInt(e.target.value, 10);
      state.page = 1;
      render();
    });
    document.getElementById('range-select').addEventListener('change', (e) => {
      const v = e.target.value;
      state.rangeDays = (v === 'all') ? 'all' : parseInt(v, 10);
      state.page = 1;
      render();
    });
    document.querySelectorAll('#view-switch button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#view-switch button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.view = btn.dataset.view;
        state.page = 1;
        render();
      });
    });
    ['prev-btn', 'prev-btn2'].forEach(id => {
      document.getElementById(id).addEventListener('click', () => {
        if (state.page > 1) { state.page--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
      });
    });
    ['next-btn', 'next-btn2'].forEach(id => {
      document.getElementById(id).addEventListener('click', () => {
        state.page++;
        render();
        window.scrollTo({top: 0, behavior: 'smooth'});
      });
    });

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      chartInstances.forEach(c => c.resize());
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(autoFitCharts, 150);
    });

    render();
  </script>
</body>
</html>
